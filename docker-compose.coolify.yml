# Coolify variant of the production stack (see docker-compose.yml for the
# standalone version). Differences:
#   - web (Caddy) publishes NO ports: Coolify's Traefik proxy owns 80/443,
#     terminates TLS for the domain and forwards traffic to caddy:80.
#   - APP_DOMAIN is fixed to ":80" so Caddy serves plain HTTP internally
#     (it still serves static files and proxies PHP to the app container).
# In Coolify: Build Pack "Docker Compose", compose file /docker-compose.coolify.yml,
# attach the https:// domain to the *web* service.

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-gestionale_muratori}
      MYSQL_USER: ${DB_USER:-gestionale}
      MYSQL_PASSWORD: ${DB_PASS:?set DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:?set DB_ROOT_PASS}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${DB_ROOT_PASS}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Gestionale Muratori}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:?set APP_URL, e.g. https://muratori.testdemo.it}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Rome}
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-gestionale_muratori}
      DB_USER: ${DB_USER:-gestionale}
      DB_PASS: ${DB_PASS:?set DB_PASS}
      SESSION_SECURE: "true"
      ALLOW_NEGATIVE_STOCK: ${ALLOW_NEGATIVE_STOCK:-false}
    volumes:
      - uploads:/var/www/app/storage/uploads
    depends_on:
      db:
        condition: service_healthy

  web:
    # Caddyfile + public/ are baked into the image (deploy/Dockerfile.web):
    # Coolify can't bind-mount repo files at runtime.
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    # No published ports on purpose: Coolify's proxy routes the domain here.
    environment:
      APP_DOMAIN: ":80"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  db_data:
  uploads:
  caddy_data:
  caddy_config:
