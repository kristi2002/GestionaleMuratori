; Production PHP overrides (loaded after the defaults as zz-app.ini).

; Uploads: the app caps photos at 8 MB — leave headroom for the multipart envelope.
upload_max_filesize = 12M
post_max_size = 16M
memory_limit = 256M

; Never leak errors to the client; log to the container's stderr.
expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /proc/self/fd/2

; "Today" for the worker app is Italian local time.
date.timezone = Europe/Rome

; Opcache: revalidate at most once a minute (deploys rebuild the image anyway).
opcache.enable = 1
opcache.memory_consumption = 128
opcache.validate_timestamps = 1
opcache.revalidate_freq = 60

; Sessions.
session.use_strict_mode = 1
session.cookie_httponly = 1
